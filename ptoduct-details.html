<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج - متجر النخبة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/product-details.css">
</head>
<body>
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="container">
            <div class="top-bar-content">
                <span><i class="fas fa-truck"></i> توصيل مجاني للطلبات فوق 200 ريال</span>
                <div class="top-bar-links">
                    <a href="login.html"><i class="fas fa-user"></i> حسابي</a>
                    <a href="#"><i class="fas fa-heart"></i> المفضلة</a>
                    <a href="#"><i class="fas fa-phone"></i> اتصل بنا</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <a href="../index.html" class="back-btn">
                    <i class="fas fa-arrow-right"></i> رجوع
                </a>
                
                <div class="logo">
                    <a href="../index.html">
                        <i class="fas fa-crown"></i>
                        <div class="logo-text">
                            <span class="logo-title">النخبة</span>
                            <span class="logo-subtitle">Elite Store</span>
                        </div>
                    </a>
                </div>
                
                <div class="header-actions">
                    <button class="icon-btn cart-btn" id="cartBtn">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="badge cart-count">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Product Details -->
    <main class="product-details-container" id="productDetails">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>جاري تحميل تفاصيل المنتج...</p>
        </div>
    </main>

    <!-- Related Products -->
    <section class="related-products-section">
        <div class="container">
            <h3 class="related-title">منتجات ذات صلة</h3>
            <div class="products-grid" id="relatedProducts">
                <!-- related products -->
            </div>
        </div>
    </section>

    <!-- Cart Modal -->
    <div class="cart-overlay" id="cartOverlay"></div>
    <div class="cart-modal" id="cartModal">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-bag"></i> سلة التسوق</h3>
            <button class="close-btn" id="closeCartBtn">&times;</button>
        </div>
        <div class="cart-body" id="cartBody"></div>
        <div class="cart-footer" id="cartFooter"></div>
    </div>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/api.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/product-details.js"></script>
</body>
</html>
