<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إتمام الشراء - متجر النخبة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/checkout.css">
</head>
<body>
    <!-- Header -->
    <header class="checkout-header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-crown"></i>
                <span>النخبة</span>
            </a>
            <div class="checkout-steps">
                <div class="step active">
                    <span class="step-number">1</span>
                    <span>الشحن</span>
                </div>
                <div class="step">
                    <span class="step-number">2</span>
                    <span>الدفع</span>
                </div>
                <div class="step">
                    <span class="step-number">3</span>
                    <span>تأكيد</span>
                </div>
            </div>
        </div>
    </header>

    <main class="checkout-container">
        <div class="container">
            <div class="checkout-grid">
                <!-- نموذج الشحن -->
                <div class="checkout-form-section">
                    <h2>معلومات الشحن</h2>
                    <form id="checkoutForm" class="checkout-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>الاسم الأول *</label>
                                <input type="text" id="firstName" required placeholder="الاسم الأول">
                            </div>
                            <div class="form-group">
                                <label>الاسم الأخير *</label>
                                <input type="text" id="lastName" required placeholder="الاسم الأخير">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label>البريد الإلكتروني *</label>
                            <input type="email" id="email" required placeholder="example@email.com">
                        </div>
                        
                        <div class="form-group">
                            <label>رقم الهاتف *</label>
                            <input type="tel" id="phone" required placeholder="05xxxxxxxx">
                        </div>
                        
                        <div class="form-group">
                            <label>المدينة *</label>
                            <select id="city" required>
                                <option value="">اختر المدينة</option>
                                <option value="الرياض">الرياض</option>
                                <option value="جدة">جدة</option>
                                <option value="مكة المكرمة">مكة المكرمة</option>
                                <option value="المدينة المنورة">المدينة المنورة</option>
                                <option value="الدمام">الدمام</option>
                                <option value="الخبر">الخبر</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>العنوان التفصيلي *</label>
                            <input type="text" id="address" required placeholder="الحي، الشارع، رقم المبنى">
                        </div>
                        
                        <div class="form-group">
                            <label>ملاحظات إضافية</label>
                            <textarea id="notes" rows="3" placeholder="أي ملاحظات للتوصيل..."></textarea>
                        </div>
                    </form>

                    <!-- طرق الدفع -->
                    <h2 style="margin-top: 30px;">طريقة الدفع</h2>
                    <div class="payment-methods-checkout">
                        <label class="payment-method active">
                            <input type="radio" name="payment" value="cod" checked>
                            <div class="payment-method-content">
                                <i class="fas fa-money-bill-wave"></i>
                                <div>
                                    <strong>الدفع عند الاستلام</strong>
                                    <small>ادفع نقداً عند استلام الطلب</small>
                                </div>
                            </div>
                        </label>
                        <label class="payment-method">
                            <input type="radio" name="payment" value="card">
                            <div class="payment-method-content">
                                <i class="fas fa-credit-card"></i>
                                <div>
                                    <strong>بطاقة ائتمان</strong>
                                    <small>Visa, Mastercard, Mada</small>
                                </div>
                            </div>
                        </label>
                        <label class="payment-method">
                            <input type="radio" name="payment" value="apple">
                            <div class="payment-method-content">
                                <i class="fab fa-apple-pay"></i>
                                <div>
                                    <strong>Apple Pay</strong>
                                    <small>دفع سريع وآمن</small>
                                </div>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- ملخص الطلب -->
                <div class="order-summary">
                    <h2>ملخص الطلب</h2>
                    <div class="order-items" id="orderItems">
                        <!-- سيتم ملؤها ديناميكياً -->
                    </div>
                    
                    <div class="order-totals">
                        <div class="total-row">
                            <span>المجموع الفرعي</span>
                            <span id="subtotal">0 ريال</span>
                        </div>
                        <div class="total-row">
                            <span>الشحن</span>
                            <span id="shipping">مجاني</span>
                        </div>
                        <div class="total-row discount-row" id="discountRow" style="display: none;">
                            <span>الخصم</span>
                            <span id="discount" style="color: var(--success-color);">0 ريال</span>
                        </div>
                        <div class="total-row coupon-row">
                            <div class="coupon-input">
                                <input type="text" id="couponCode" placeholder="كود الخصم">
                                <button onclick="applyCoupon()">تطبيق</button>
                            </div>
                        </div>
                        <div class="total-row grand-total">
                            <span>الإجمالي</span>
                            <span id="grandTotal">0 ريال</span>
                        </div>
                    </div>
                    
                    <button class="btn-place-order" onclick="placeOrder()">
                        <i class="fas fa-lock"></i> تأكيد الطلب
                    </button>
                    
                    <p class="secure-notice">
                        <i class="fas fa-shield-alt"></i>
                        جميع معلوماتك آمنة ومشفرة
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Notification -->
    <div class="notification" id="notification"></div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/api.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/checkout.js"></script>
</body>
</html>
