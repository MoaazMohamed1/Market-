<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - متجر النخبة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <a href="../index.html" class="auth-logo">
                <i class="fas fa-crown"></i>
                <span>النخبة</span>
            </a>
            
            <h2>إنشاء حساب جديد</h2>
            <p class="auth-subtitle">انضم إلينا واستمتع بتجربة تسوق مميزة</p>
            
            <form class="auth-form" id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">الاسم الأول</label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="firstName" placeholder="الاسم الأول" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="lastName">الاسم الأخير</label>
                        <div class="input-group">
                            <i class="fas fa-user"></i>
                            <input type="text" id="lastName" placeholder="الاسم الأخير" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="regEmail">البريد الإلكتروني</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="regEmail" placeholder="أدخل بريدك الإلكتروني" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="phone">رقم الهاتف</label>
                    <div class="input-group">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="phone" placeholder="05xxxxxxxx" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="regPassword">كلمة المرور</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="regPassword" placeholder="كلمة المرور (8 أحرف على الأقل)" required minlength="8">
                        <button type="button" class="toggle-password" data-target="regPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">تأكيد كلمة المرور</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" placeholder="أعد كتابة كلمة المرور" required>
                        <button type="button" class="toggle-password" data-target="confirmPassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" required> أوافق على <a href="#">الشروط والأحكام</a>
                    </label>
                </div>
                
                <button type="submit" class="btn-auth">
                    <i class="fas fa-user-plus"></i> إنشاء حساب
                </button>
            </form>
            
            <p class="auth-footer">
                لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
            </p>
        </div>
        
        <div class="auth-image">
            <div class="auth-image-content">
                <i class="fas fa-user-plus"></i>
                <h2>انضم إلى عائلة النخبة</h2>
                <p>احصل على خصم 10% على أول طلب لك</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/api.js"></script>
    <script src="../js/cart.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
